<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapleWasher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1c1917;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    .container {
      max-width: 1000px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #f5f0e8;
      font-size: 1.6rem;
      margin-bottom: 24px;
    }

    .section {
      background: #292524;
      border: 1px solid #44403c;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #d6d3d1;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #d6d3d1;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      background: #1c1917;
      border: 1px solid #44403c;
      border-radius: 4px;
      padding: 8px 10px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.9rem;
    }

    input:focus, select:focus { outline: none; border-color: #e8814a; }

    .btn {
      display: inline-block;
      background: #e8814a;
      color: #1c1917;
      border: none;
      border-radius: 4px;
      padding: 8px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover { background: #f0996a; }

    .result {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 1rem;
      color: #f5f0e8;
      padding: 12px;
      background: #1c1917;
      border-radius: 4px;
      border: 1px solid #44403c;
      white-space: pre-wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MapleWasher</h1>

    <div class="section">
      <div class="section-title">Inputs</div>
      <div class="grid">
        <div>
          <label for="input-a">Input A</label>
          <input id="input-a" type="number" value="0">
        </div>
        <div>
          <label for="input-b">Input B</label>
          <input id="input-b" type="number" value="0">
        </div>
      </div>
      <button class="btn" id="calc-btn">Calculate</button>
    </div>

    <div class="section">
      <div class="section-title">Result</div>
      <div class="result" id="result">—</div>
    </div>
  </div>

  <script>
    const calcBtn = document.getElementById('calc-btn');
    const resultEl = document.getElementById('result');

    calcBtn.addEventListener('click', () => {
      const a = parseFloat(document.getElementById('input-a').value) || 0;
      const b = parseFloat(document.getElementById('input-b').value) || 0;
      resultEl.textContent = `A + B = ${a + b}`;
    });
  </script>
</body>
</html>
